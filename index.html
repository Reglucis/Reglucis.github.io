<!DOCTYPE html>
<html lang="zh-cn">

<head>
	<meta charset="utf-8">
	<title>Merry Christmas</title>
	<link rel="icon" type="image/x-icon" href="./favicon/7703christmas_tree.ico">
	<link rel="stylesheet" href="./style.css">
	<link rel="stylesheet" href="./tree.css">
</head>

<body>
	<body background="./img/background.jpg">



	<div class="name">
		<img src="./img/mistletoe.svg" style="height:24px;">
		<x-sign  style="display: inline;">
			圣诞快乐
		</x-sign>
		<img src="./img/mistletoe.svg" style="height:24px;">
		<div style="height:10px;"> </div>
		<img src="./img/star_01.svg" style="height:24px;">
		<x-sign style="display: inline;">
			王雯迪
		</x-sign>
		<img src="./img/star_01.svg" style="height:24px;">
	</div>

		<div>
		</div>	
	<div class="treecontainer">
		<ul class="tree">
			<div class="star"></div>
			<div class="chunk"></div>
		</ul>
	</div>
	<div>
	<audio controls id="BGM" height="1" width="1" autoplay="autoplay" loop="loop" hidden>
		<source src="./music/backgroundmusic.mp3" type="audio/mpeg">
		<embed height="1" width="1" src="./music/backgroundmusic.mp3">
	</audio>
	</div>
	

	</body>
	<script>
		let tree = document.querySelector(".tree");
		for (let i = 0; i < 129; i++) {
			let li = document.createElement("li");
			li.style = `--i:${i}`;
			tree.appendChild(li);
		}

		function toggleSound() {
            var music = document.getElementById("BGM");//获取ID  
                console.log(music);
                console.log(music.paused);
            if (music.paused) { //判读是否播放  
                music.paused=false;
                music.play(); //没有就播放 
            	}         
        }

	setInterval("toggleSound()",1);
	</script>
	
</html>
